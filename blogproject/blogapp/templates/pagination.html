<!--左右の中央に配置-->
<ul class="pagination" style="justify-content:center">
    <!--
    前ページを表示するアイコンとリンクの設定
    ページネーションされたpageオブジェクトをorderby_recordsで取得
    page.has_prebious直前にページがある場合にtrueを返す
    -->
    {% if orderby_records.has_previous %}
    <!--
    前のページが存在する場合はそのページヘのリンクが設定されたアイコンを表示
    page.previous_page_number直前のページ番号を返す
    -->
    <li class="page-item">
        <a class="page-link"
            href="?page={{ orderby_records.previous_page_number }}"
            aria-label="Previous">
            <span aria-hidden="true">&laquo;</span>
        </a>
    </li>
    {% endif %}
    <!--
    すべてのページについてページ番号のアイコンを表示
    paginator.page_range:[1,2,3,4]のように1から始まるページ番号を返す
    orderby_records.paginator.page_rangeとして取得
    ブロックパラメータnumに順次取り出される
    -->
    {% for num in orderby_records.paginator.page_range %}
        <!--
        各ページのアイコンを出力
        page.number：引き渡されたページのページ番号を返す
        -->
        {% if orderby_records.number == num %}
        <!--
        処理中のページ番号が引き渡されたページのページ番号と一致する場合は
        ページ番号のアイコン（アクティブ状態）を表示（リンクは設定しない）
        -->
        <li class="page-item active">
            <span class="page-link">{{ num }}</span>
        </li>
        <!--
        ページ番号が引き渡されたページのページ番号と一致しない場合
        -->
        {% else %}
        <!--
        ページ番号のアイコン（アクティブ状態ではない）にリンクを設定して表示
        -->
        <li class="page-item">
            <a class="page-link" href="?page={{ num }}">{{ num }}</a>
        </li>
        {% endif %}
    {% endfor %}
    <!--
    次ページヘのリンクを示すアイコンの表示
    page.has_next:次のページがある場合にtrueを返す
    -->
    {% if orderby_records.has_next %}
    <!--
    次ページが存在する場合はリンクを設定したアイコンを表示
    page.next_page_number:次のページ番号を返す
    -->
    <li class="page-item">
        <a class="page-link"
            href="?page={{ orderby_records.next_page_number }}"
            aria-label="Next">
            <span aria-hidden="true">&raquo;</span>
        </a>
    </li>
    {% endif %}
</ul>
